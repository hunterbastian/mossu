<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Mossu</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      html,
      body,
      #app {
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: linear-gradient(180deg, #c7f5ff 0%, #edfbd6 72%, #9bc46f 100%);
        color: #143f4d;
        font-family: ui-rounded, "Avenir Next", system-ui, sans-serif;
      }

      .instant-title {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        text-align: center;
        background:
          radial-gradient(circle at 50% 68%, rgba(118, 174, 89, 0.36), transparent 20rem),
          linear-gradient(180deg, rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0));
      }

      .instant-title strong {
        display: block;
        font-size: clamp(3.4rem, 10vw, 7.8rem);
        font-weight: 950;
        letter-spacing: 0;
        line-height: 0.88;
        text-shadow: 0 0.28rem 0 rgba(255, 255, 255, 0.66);
      }

      .instant-title [data-loading-status] {
        display: block;
        margin-top: 1rem;
        min-height: 1.2em;
        font-size: clamp(0.72rem, 1.5vw, 0.92rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(20, 63, 77, 0.72);
      }

      .instant-title__mark {
        position: relative;
        width: 5.2rem;
        height: 2.35rem;
        margin: 0 auto 1.15rem;
      }

      .instant-title__mark span {
        position: absolute;
        bottom: 0;
        width: 1.18rem;
        height: 1.18rem;
        border-radius: 999px;
        background: #5b9b58;
        box-shadow:
          inset 0 0.18rem 0 rgba(255, 255, 255, 0.45),
          0 0.35rem 0 rgba(69, 121, 69, 0.13);
      }

      .instant-title__mark span:nth-child(1) {
        left: 0.35rem;
      }

      .instant-title__mark span:nth-child(2) {
        left: 2rem;
        background: #77b865;
      }

      .instant-title__mark span:nth-child(3) {
        left: 3.65rem;
        background: #93c66b;
      }

      .instant-title span {
        display: block;
        margin-top: 0.8rem;
        font-size: clamp(0.78rem, 1.8vw, 1rem);
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

    </style>
  </head>
  <body>
    <div id="app">
      <div class="instant-title" aria-label="Mossu">
        <div>
          <div class="instant-title__mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <strong>Mossu</strong>
          <span>Meadow trail</span>
          <p data-loading-status="" aria-live="polite"></p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
