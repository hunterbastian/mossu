<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Mossu</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      html,
      body,
      #app {
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background:
          radial-gradient(circle at 28% 30%, rgba(221, 244, 143, 0.72), transparent 17rem),
          radial-gradient(circle at 68% 38%, rgba(101, 205, 219, 0.46), transparent 19rem),
          radial-gradient(circle at 52% 78%, rgba(124, 207, 111, 0.58), transparent 24rem),
          linear-gradient(135deg, #d8f8ee 0%, #b8eadf 34%, #d7e999 62%, #87c880 100%);
        color: #3d2a1a;
        font-family: Georgia, "Palatino Linotype", "Avenir Next", ui-rounded, system-ui, sans-serif;
      }

      .instant-title {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        text-align: center;
        background:
          radial-gradient(circle at 50% 44%, rgba(255, 243, 160, 0.5), transparent 20rem),
          radial-gradient(circle at 54% 52%, rgba(139, 238, 211, 0.28), transparent 24rem),
          linear-gradient(135deg, rgba(216, 248, 238, 0.92), rgba(135, 200, 128, 0.86));
      }

      .instant-title::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          repeating-linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.055) 0,
            rgba(255, 255, 255, 0.055) 1px,
            rgba(21, 54, 45, 0.055) 2px,
            transparent 4px
          );
        opacity: 0.34;
      }

      .instant-title > div {
        position: relative;
        z-index: 1;
        min-width: min(28rem, calc(100vw - 2rem));
        padding: clamp(1.25rem, 4vw, 2.2rem) clamp(1.25rem, 5vw, 2.8rem);
        border: 3px solid rgba(125, 86, 36, 0.86);
        border-radius: 1.2rem;
        background:
          linear-gradient(180deg, rgba(255, 251, 222, 0.94), rgba(239, 210, 138, 0.88)),
          rgba(255, 237, 176, 0.92);
        box-shadow:
          inset 0 0 0 2px rgba(255, 246, 198, 0.9),
          0 0.5rem 0 rgba(116, 78, 33, 0.38),
          0 1.6rem 3rem rgba(55, 75, 42, 0.2);
      }

      .instant-title strong {
        display: block;
        font-size: clamp(3.4rem, 10vw, 7.8rem);
        font-weight: 950;
        letter-spacing: 0;
        line-height: 0.88;
        color: #f5c85d;
        -webkit-text-stroke: clamp(0.07rem, 0.28vw, 0.13rem) rgba(96, 56, 25, 0.92);
        text-shadow:
          0 0.04em 0 #fff5c4,
          0 0.1em 0 #a66b2c,
          0 0.18em 0 rgba(80, 106, 61, 0.6),
          0 0.24em 0.46em rgba(66, 56, 30, 0.18);
      }

      .instant-title [data-loading-status] {
        display: block;
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      .instant-title__mark {
        position: relative;
        width: 5.2rem;
        height: 2.35rem;
        margin: 0 auto 1.15rem;
      }

      .instant-title__mark span {
        position: absolute;
        bottom: 0;
        width: 1.18rem;
        height: 1.18rem;
        border-radius: 999px;
        background: #78b56d;
        box-shadow:
          inset 0 0.18rem 0 rgba(255, 255, 255, 0.45),
          0 0.35rem 0 rgba(69, 121, 69, 0.13);
      }

      .instant-title__mark span:nth-child(1) {
        left: 0.35rem;
      }

      .instant-title__mark span:nth-child(2) {
        left: 2rem;
        background: #f1bd5c;
      }

      .instant-title__mark span:nth-child(3) {
        left: 3.65rem;
        background: #5bb6b2;
      }

      .instant-title span {
        display: block;
        margin-top: 0.8rem;
        font-size: clamp(0.78rem, 1.8vw, 1rem);
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

    </style>
  </head>
  <body>
    <div id="app">
      <div class="instant-title" aria-label="Mossu">
        <div>
          <div class="instant-title__mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <strong>Mossu</strong>
          <p data-loading-status="" aria-live="polite"></p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
